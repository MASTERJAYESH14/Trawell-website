<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trawell - Apka Safar, Apka Andaz</title>
    <link rel="icon" type="image/png" href="public/trawell_compass.jpg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              cursive: ['Dancing Script', 'cursive'],
            },
            colors: {
              trawell: {
                bg: '#FBF6E9',
                orange: '#D95D2E',
                green: '#2C4A3B',
                dark: '#1A1A1A',
                gray: '#F3F4F6'
              }
            },
            animation: {
              'spin-slow': 'spin 8s linear infinite',
              'spin-fast': 'spin 4.5s linear infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          },
        },
      }
    </script>
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w1qncdcypz");
    </script>
    <style>
      body {
        background-color: #FBF6E9;
        color: #1A1A1A;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Custom Date Picker Styling */
      input[type="date"]::-webkit-calendar-picker-indicator {
        opacity: 0;
        position: absolute;
        right: 0;
        top: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
      }
      input[type="date"] {
        position: relative;
      }
      
      /* React DatePicker Customization */
      .react-datepicker-wrapper {
        width: 100%;
      }
      .trawell-calendar {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        border: 1px solid #E5E7EB !important;
        border-radius: 1rem !important;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
        padding: 0.5rem !important;
        background-color: #ffffff !important;
      }
      .trawell-calendar .react-datepicker__header {
        background-color: #ffffff !important;
        border-bottom: none !important;
        padding-top: 0.5rem !important;
      }
      .trawell-calendar .react-datepicker__current-month {
        color: #1A1A1A !important;
        font-weight: 700 !important;
        font-size: 1rem !important;
        margin-bottom: 0.5rem !important;
      }
      .trawell-calendar .react-datepicker__day-name {
        color: #6B7280 !important;
        font-weight: 600 !important;
        width: 2.5rem !important;
      }
      .trawell-calendar .react-datepicker__day {
        color: #1A1A1A !important;
        width: 2.5rem !important;
        line-height: 2.5rem !important;
        border-radius: 0.5rem !important;
        margin: 0.1rem !important;
        font-weight: 500 !important;
        transition: all 0.2s !important;
      }
      .trawell-calendar .react-datepicker__day:hover {
        background-color: #F3F4F6 !important;
        color: #D95D2E !important;
      }
      .trawell-calendar .react-datepicker__day--selected,
      .trawell-calendar .react-datepicker__day--keyboard-selected {
        background-color: #D95D2E !important;
        color: #ffffff !important;
        font-weight: 700 !important;
      }
      .trawell-calendar .react-datepicker__day--disabled {
        color: #D1D5DB !important;
        cursor: not-allowed !important;
      }
      .trawell-calendar .react-datepicker__day--disabled:hover {
        background-color: transparent !important;
        color: #D1D5DB !important;
      }
      .trawell-calendar .react-datepicker__navigation {
        top: 1rem !important;
      }
      .trawell-calendar .react-datepicker__navigation-icon::before {
        border-color: #6B7280 !important;
        border-width: 2px 2px 0 0 !important;
      }
      .trawell-calendar .react-datepicker__navigation:hover .react-datepicker__navigation-icon::before {
        border-color: #D95D2E !important;
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
